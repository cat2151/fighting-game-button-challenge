lever_toml        = "config/lever_names.toml"
button_names_toml = "config/button_names.toml"
alias_toml        = "config/alias.toml"
mission_toml      = "config/mission.toml"
#moves_toml        = "config/moves.toml"
moves_toml        = "config/moves_sf6lily.toml"

# DEBUG CONFIGURATION: Start from specific mission index
# This configuration file is for debugging purposes.
# With use_random_mission = false and start_mission_index set, you can start
# from a specific mission (e.g., 2nd mission, 5th mission, etc.)
challenge_phase = "1_buttons"  # "1_buttons" or "2_moves"
                               # "1_buttons": ボタン練習フェーズ (amplifies missions with left/right variants)
                               # "2_moves": 技練習フェーズ (missions with directional awareness, toggles left/right each cycle)

use_random_mission = false     # DEBUG: Disable random mission selection for reproducible testing

start_mission_index = 5        # DEBUG: Start from 6th mission (0-based index, so 5 = 6th mission)
                               # If index is out of range, wraps around using modulo

title = "ボタンチャレンジ [DEBUG: Start Index=5] 終了はterminalでCTRL+C"
geometry = "700x150+256+256"
font_name = "Arial"
font_size = 20

histogram_mode_sample_count = 50 # hist中心の表示用

[display_format_phase1]
    label1 = "mission : {mission}"
    label2 = "move : {move_name}"
    label3 = "{lever_plus_pressed}"
    label4 = "score:{score} fail:{fail_count} 前回:{last_mission_frame_count} 最速:{prev_success_min_frame_count} hist中心:{prev_success_hist_center} now:{current_mission_frame_count}"

[display_format_phase2]
    label1 = "mission : {mission}"
    label2 = "{direction_arrow}"
    label3 = "{lever_plus_pressed}"
    label4 = "score:{score} fail:{fail_count} 前回:{last_mission_frame_count} 最速:{prev_success_min_frame_count} hist中心:{prev_success_hist_center} now:{current_mission_frame_count}"

[backmost_mode]
    check_interval_sec = 10
    process_names = ['StreetFighter6.exe', 'CapcomFightingCollection.exe']
