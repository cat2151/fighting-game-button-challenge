lever_toml        = "config/lever_names.toml"
button_names_toml = "config/button_names.toml"
alias_toml        = "config/alias.toml"
mission_toml      = "config/mission.toml"
#moves_toml        = "config/moves.toml"
moves_toml        = "config/moves_sf6lily.toml"

challenge_phase = "1_buttons"
#challenge_phase = "2_moves"
use_random_mission = true
#use_random_mission = false
#start_mission_index = 0
#debug_print = true
debug_print = false

title = "ボタンチャレンジ 終了はterminalでCTRL+C"
geometry = "700x150+256+256"
font_name = "Arial"
font_size = 20

histogram_mode_sample_count = 50 # hist中心の表示用

# Theme settings
# theme_mode: "light" (ライトモード), "dark" (ダークモード), "system" (OSの設定に追従)
[theme]
    mode = "system"
    
    # Light theme colors
    [theme.light]
        bg_color = "SystemButtonFace"
        fg_color = "black"
        success_color = "#00FF00"
        fail_color = "red"
    
    # Dark theme colors
    [theme.dark]
        bg_color = "#2b2b2b"
        fg_color = "#ffffff"
        success_color = "#00FF00"
        fail_color = "#ff4444"

[display_format_phase1]
    label1 = "mission : {mission}"
    label2 = "{lever_plus_pressed}"
#    label2 = "move : {move_name}"
    label3 = ""
    label4 = "score:{score} fail:{fail_count} 前回:{last_mission_frame_count} 最速:{prev_success_min_frame_count} hist中心:{prev_success_hist_center} now:{current_mission_frame_count}"

[display_format_phase2]
    label1 = "{direction_arrow}"
    label2 = "mission : {mission}"
    label3 = "{lever_plus_pressed}"
    label4 = "score:{score} fail:{fail_count} 前回:{last_mission_frame_count} 最速:{prev_success_min_frame_count} hist中心:{prev_success_hist_center} now:{current_mission_frame_count}"

[backmost_mode]
    check_interval_sec = 10
    process_names = ['StreetFighter6.exe', 'CapcomFightingCollection.exe']
